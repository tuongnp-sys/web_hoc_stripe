services:
  - type: web
    name: stripe-lab-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: EXTRA_CORS_ORIGINS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: STRIPE_PRICE_GOLD_STARTER
        sync: false
      - key: STRIPE_PRICE_GOLD_POPULAR
        sync: false
      - key: STRIPE_PRICE_GOLD_PRO
        sync: false
      - key: STRIPE_PRICE_GOLD_MEGA
        sync: false
      - key: STRIPE_PRICE_PREMIUM_MONTHLY
        sync: false
      - key: STRIPE_TAX_ENABLED
        sync: false
